<!DOCTYPE html>
<html>
<head>
    <title>Burauen Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Burauen Map</h1>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the map
        var map = L.map('map').setView([13.0333, 124.8178], 13);
        
        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // Sample boarding house pins
        var boardingHouses = [
            { lat: 13.0333, lng: 124.8178, name: 'Boarding House 1' },
            { lat: 13.0340, lng: 124.8180, name: 'Boarding House 2' }
        ];
        
        // Adding the pins to the map
        boardingHouses.forEach(function(house) {
            var marker = L.marker([house.lat, house.lng]).addTo(map);
            marker.bindPopup(house.name);
            marker.on('click', function() {
                // Handle pin click
                alert('Clicked on ' + house.name);
                // Add logic for bottom sheet interaction here
            });
        });
    </script>
</body>
</html>
